<!doctype html>
<html lang="es-MX" class="smooth-theme">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0" />
    <meta name="theme-color" content="#e6007e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Beauty's Me" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="description" content="Catálogo, apartados y ventas · Beauty's Me" />

    <!--
      Preconnect a Supabase: el browser abre la conexión TCP+TLS al servidor
      antes de la primera query real. Ahorra ~100-200ms del primer fetch.
      DNS-prefetch como fallback para navegadores que no soportan preconnect.
    -->
    <link rel="preconnect" href="https://wnnmugdynldfglabaajk.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://wnnmugdynldfglabaajk.supabase.co" />

    <!--
      Tipografía premium · Inter Variable. Reemplaza la system-ui default
      con una fuente moderna (la misma que usan Linear, Vercel, GitHub).
      `font-display: swap` evita FOUT visible. Preconnect a Google Fonts
      para acelerar el primer load. Caída elegante a system-ui si falla.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!--
      Open Props · variables CSS premium (shadows, easings, animations)
      preempaquetadas. Cargadas via CDN unpkg sin install. Tamaño minified
      < 20KB, cacheado fuerte. Disponibles en cualquier rule CSS como
      `var(--shadow-3)`, `var(--ease-spring-3)`, `var(--size-fluid-2)`,
      etc. Sin obligación de migrar — los nuevos componentes los pueden
      usar, los viejos siguen igual.
      Versión 1.7.x fijada para evitar breaking changes en CDN.
    -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/open-props@1.7.4/open-props.min.css"
      crossorigin
    />

    <title>Beauty's Me</title>

    <!--
      ANTI-FOUC: aplicamos el tema (dark/light) al <html> ANTES de que el
      browser pinte la primera vez. Sin esto, la página flashea blanca
      hasta que React monta y ejecuta applyTheme(). Lee la misma key
      `mari-theme` que useTheme.ts. Si vale "system", consulta el SO.
      Si el admin forzó un modo desde BusinessRules, App.tsx lo aplicará
      después; eso ya no flashea porque el primer paint ya respetó la
      última preferencia que el usuario vio.

      Fallback hidden si JS está bloqueado: la app no funciona sin JS
      de todas formas, así que sólo es de adorno.
    -->
    <script>
      (function () {
        try {
          var pref = localStorage.getItem("mari-theme");
          var prefersDark = window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          var dark =
            pref === "dark" ||
            (pref !== "light" && prefersDark);
          var html = document.documentElement;
          html.dataset.theme = dark ? "dark" : "light";
          html.style.colorScheme = dark ? "dark" : "light";
          if (dark) html.classList.add("dark");
        } catch (e) {
          /* localStorage bloqueado: el default light está bien. */
        }
      })();
    </script>
    <style>
      /* Mientras React monta, el fondo coincide con el tema aplicado
         por el script de arriba — evita el flash blanco→oscuro. */
      html[data-theme="dark"] { background-color: #020617; color: #f1f5f9; }
      html[data-theme="light"] { background-color: #f8fafc; color: #0f172a; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
